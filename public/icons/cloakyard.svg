  <!-- LID -->
  <path d="M12 17.5 Q12 17.5 12 17.5 L36 17.5 L36 24 L12 24 Z"
        fill="#FFFFFF" opacity="0.95"/>
  <path d="M12 17.5 L36 17.5 L36 19.5 L12 19.5 Z" fill="#FFFFFF" opacity="1"/>

  <!-- BODY -->
  <path d="M12 24 L36 24 L36 34 Q36 35.5 34.5 35.5 L13.5 35.5 Q12 35.5 12 34 Z"
        fill="#FFFFFF" opacity="0.88"/>

  <!-- Seam line -->
  <rect x="12" y="23.6" width="24" height="0.8" fill="#1D4ED8" opacity="0.35"/>

  <!-- Center clasp -->
  <rect x="22" y="22.2" width="4" height="3.2" rx="0.6" fill="#1D4ED8" opacity="0.55"/>
  <circle cx="24" cy="23.8" r="0.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Body detail: a soft compartment line -->
