<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="512" height="512" fill="none" role="img" aria-label="CloakYard">
  <defs>
    <linearGradient id="shieldC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- SHIELD -->
  <path d="M24 3 L41 10 V25 C41 36 33 42.5 24 45.5 C15 42.5 7 36 7 25 V10 L24 3Z"
