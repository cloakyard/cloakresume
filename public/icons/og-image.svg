<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#EEF2FF" />
      <stop offset="100%" stop-color="#F8FAFC" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Logo (scaled 3.5x, exact copy from logo.svg) -->
  <g transform="translate(516, 40) scale(3.5)">
    <!-- SHIELD -->
    <path d="M24 3
       L41 10
       V25
       C41 36 33 42.5 24 45.5
       C15 42.5 7 36 7 25
       V10
       L24 3Z"
          fill="url(#shieldGrad)" />

    <!-- DOCUMENT -->
    <path d="M16.5 12
             L28 12
             L33 17
             L33 34.5
             A1.5 1.5 0 0 1 31.5 36
             L16.5 36
             A1.5 1.5 0 0 1 15 34.5
             L15 13.5
             A1.5 1.5 0 0 1 16.5 12
             Z"
          fill="#FFFFFF"
          opacity="0.95" />

    <!-- FOLDED FLAP -->
    <path d="M28 12
             L28 15.5
             A1.5 1.5 0 0 0 29.5 17
             L33 17
             Z"
          fill="#DBEAFE"
          opacity="0.85" />

    <!-- AVATAR CIRCLE -->
    <circle cx="20" cy="20" r="2.2" fill="#1D4ED8" opacity="0.8" />

    <!-- NAME / HEADER LINES -->
    <g fill="#1D4ED8" opacity="0.8">
        <rect x="23.5" y="19" width="7" height="1.4" rx="0.7" />
        <rect x="23.5" y="21.4" width="5" height="1.1" rx="0.55" />
    </g>

    <!-- RESUME CONTENT LINES -->
    <g fill="#1D4ED8" opacity="0.8">
        <rect x="18" y="26" width="12" height="1.5" rx="0.75" />
        <rect x="18" y="29" width="10" height="1.5" rx="0.75" />
        <rect x="18" y="32" width="11" height="1.5" rx="0.75" />
    </g>
  </g>

  <!-- App name -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#1E293B" letter-spacing="-1.5">CloakResume</text>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#6366F1">Private, ATS-Friendly Resume Builder — Runs in Your Browser</text>

  <!-- Subtle divider -->
  <rect x="530" y="342" width="140" height="1.5" rx="0.75" fill="#C7D2FE" fill-opacity="0.5" />

  <!-- Feature cards — 2x2 grid -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <!-- Beautiful Templates — blue -->
    <rect x="220" y="365" width="340" height="60" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2" />
    <circle cx="258" cy="395" r="15" fill="#DBEAFE" />
    <g transform="translate(250.5, 387.5) scale(0.625)" fill="none" stroke="#2563EB" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </g>
    <text x="284" y="391" font-size="17" font-weight="600" fill="#1E40AF">Beautiful Templates</text>
    <text x="284" y="408" font-size="12" font-weight="400" fill="#3B82F6">Classic, modern, sidebar, timeline &amp; more</text>

    <!-- ATS-Friendly — violet -->
    <rect x="640" y="365" width="340" height="60" rx="16" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2" />
    <circle cx="678" cy="395" r="15" fill="#EDE9FE" />
    <g transform="translate(670.5, 387.5) scale(0.625)" fill="none" stroke="#7C3AED" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <path d="m9 11 3 3L22 4"/>
    </g>
    <text x="704" y="391" font-size="17" font-weight="600" fill="#5B21B6">ATS-Friendly</text>
    <text x="704" y="408" font-size="12" font-weight="400" fill="#7C3AED">Live score, keyword matching &amp; review</text>

    <!-- Customise & Theme — emerald -->
    <rect x="220" y="440" width="340" height="60" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2" />
    <circle cx="258" cy="470" r="15" fill="#D1FAE5" />
    <g transform="translate(250.5, 462.5) scale(0.625)" fill="none" stroke="#059669" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="13.5" cy="6.5" r=".5"/>
      <circle cx="17.5" cy="10.5" r=".5"/>
      <circle cx="8.5" cy="7.5" r=".5"/>
      <circle cx="6.5" cy="12.5" r=".5"/>
      <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
    </g>
    <text x="284" y="466" font-size="17" font-weight="600" fill="#065F46">Customise &amp; Theme</text>
    <text x="284" y="483" font-size="12" font-weight="400" fill="#059669">Pick colours, fonts &amp; reorder sections</text>

    <!-- Export to PDF — amber -->
    <rect x="640" y="440" width="340" height="60" rx="16" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.2" />
    <circle cx="678" cy="470" r="15" fill="#FEF3C7" />
    <g transform="translate(670.5, 462.5) scale(0.625)" fill="none" stroke="#B45309" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </g>
    <text x="704" y="466" font-size="17" font-weight="600" fill="#92400E">Export to PDF</text>
    <text x="704" y="483" font-size="12" font-weight="400" fill="#B45309">High-quality, print-ready output</text>
  </g>

  <!-- Privacy line -->
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#64748B">No uploads  ·  No servers  ·  Works offline  ·  Open source</text>

  <!-- Bottom accent line -->
  <rect x="450" y="580" width="300" height="3" rx="1.5" fill="#818CF8" fill-opacity="0.3" />
</svg>
